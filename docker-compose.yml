version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: ivc-mongo
    ports:
      - "27017:27017"
    volumes:
      - ivc-mongo-data:/data/db

  backend:
    build: 
      context: ./backend
    container_name: ivc-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    container_name: ivc-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend

volumes:
  ivc-mongo-data:
